name: Release Android App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Rust deps
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm deps
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Init Tauri Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Decode Android keystore (release builds)
        if: github.event_name == 'push' || github.event.inputs.release_type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — APK will be unsigned (only debug-signable)"
          else
            echo "$KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/keystore.jks
          fi

      - name: Configure signing (release builds)
        if: github.event_name == 'push' || github.event.inputs.release_type == 'release'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -f src-tauri/gen/android/keystore.jks ]; then
            cat > src-tauri/gen/android/keystore.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          storeFile=../keystore.jks
          EOF
            APP_GRADLE=src-tauri/gen/android/app/build.gradle.kts
            if ! grep -q "keystore.properties" "$APP_GRADLE"; then
              python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("src-tauri/gen/android/app/build.gradle.kts")
          s = p.read_text()
          inject = '''
          import java.util.Properties
          import java.io.FileInputStream

          val keystorePropertiesFile = rootProject.file("keystore.properties")
          val keystoreProperties = Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }
          '''
              s = inject + "\n" + s
              s = re.sub(
                  r"(android \{)",
                  r"""\1
              signingConfigs {
                  create("release") {
                      if (keystoreProperties.containsKey("storeFile")) {
                          storeFile = rootProject.file(keystoreProperties["storeFile"] as String)
                          storePassword = keystoreProperties["storePassword"] as String
                          keyAlias = keystoreProperties["keyAlias"] as String
                          keyPassword = keystoreProperties["keyPassword"] as String
                      }
                  }
              }""",
                  s, count=1,
              )
              s = re.sub(
                  r'(getByName\("release"\) \{)',
                  r'\1\n            signingConfig = signingConfigs.getByName("release")',
                  s, count=1,
              )
              p.write_text(s)
          PY
            fi
          fi

      - name: Build Android APK (release)
        if: github.event_name == 'push' || github.event.inputs.release_type == 'release'
        run: npx tauri android build --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Build Android APK (debug)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'debug'
        run: npx tauri android build --apk --debug
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Collect APK
        run: |
          mkdir -p dist-android
          # Universal APK (alle Architekturen in einer Datei → einfacher Direktverkauf)
          find src-tauri/gen/android/app/build/outputs/apk -name "*universal*.apk" -exec cp {} dist-android/KI-Guide_${{ github.ref_name || 'dev' }}.apk \; || true
          # Fallback: irgendeine APK nehmen
          if [ -z "$(ls -A dist-android/ 2>/dev/null)" ]; then
            find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -exec cp {} dist-android/ \;
          fi
          ls -lh dist-android/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ github.event.inputs.release_type || 'release' }}
          path: dist-android/*.apk
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist-android/*.apk
          name: "KI-Guide ${{ github.ref_name }}"
          body: |
            ## Android Installation

            1. `KI-Guide_*.apk` auf dein Android-Gerät herunterladen
            2. Datei im Dateimanager öffnen
            3. Beim Hinweis "Installation aus unbekannten Quellen" → "Einstellungen" → für den Browser/Dateimanager erlauben → zurück
            4. "Installieren" tippen → fertig

            Die App läuft offline, keine weiteren Schritte nötig.
